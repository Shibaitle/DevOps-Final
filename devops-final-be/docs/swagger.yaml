  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Login with username or email and password to get access token.
        You must provide EITHER username OR email, not both
      parameters:
      - description: Login credentials (provide EITHER username OR email with password,
          not both)
        in: body
        name: request
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
            remember:
              type: boolean
            username:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            properties:
              message:
                type: string
              result:
                properties:
                  email:
                    type: string
                  profile_image:
                    type: string
                  token:
                    type: string
                  user_id:
                    type: string
                  username:
                    type: string
                type: object
              status:
                type: string
              status_code:
                type: integer
            type: object
        "400":
          description: Bad Request - Missing credentials, sent both username and email,
            or missing password
          schema:
            properties:
              message:
                type: string
              result: {}
              status:
                type: string
              status_code:
                type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            properties:
              message:
                type: string
              result: {}
              status:
                type: string
              status_code:
                type: integer
            type: object
      summary: User Login
      tags:
      - Authentication
