name: Frontend CI

on:
  pull_request:
    paths: ['devops-final-fe/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./devops-final-fe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
        
      - name: Run Linter
        run: bun run lint
        
      - name: Run Type Check
        run: bun run typecheck
