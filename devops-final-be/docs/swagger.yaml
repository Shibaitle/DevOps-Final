    type: object
  models.UpdateWarehouseItemRequest:
    properties:
      category:
        type: string
      code:
        type: string
      description:
        type: string
      minimumQuantity:
        type: integer
      name:
        type: string
      quantity:
        type: integer
      unit:
        type: string
    type: object
  models.WarehouseDashboardSummaryResponse:
    properties:
      low_stock_items_count:
        type: integer
      low_stock_threshold:
        type: integer
      pending_restock_requests_count:
        type: integer
      pending_withdraw_requests_count:
        type: integer
      total_items_count:
        type: integer
    type: object
  models.WarehouseTransactionResponse:
    properties:
      approvalStatus:
        type: string
      approvedAt:
        type: string
      approvedBy:
        type: string
      code:
        type: string
      date:
        type: string
      id:
        type: string
      itemCode:
        type: string
      itemName:
        type: string
      operator:
        type: string
      quantity:
        type: integer
      rejectedAt:
        type: string
      rejectedBy:
        type: string
      rejectionReason:
        type: string
      type:
        type: string
    type: object
