version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: devops_final_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: devops_final_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  server:
    container_name: devops_final_server
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: on-failure
    env_file:
      - .env.dev
    environment:
      - DB_HOST=postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
